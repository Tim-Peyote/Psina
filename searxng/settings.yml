use_formats:
  - html
  - json

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "auto"
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  secret_key: "zalutka_secret_key_change_me_in_production"
  limiter: false
  image_proxy: false

engines:
  - name: google
    engine: google
    shortcut: g

  - name: bing
    engine: bing
    shortcut: b

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: wikipedia
    engine: wikipedia
    shortcut: wp

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
  pool_connections: 10
  pool_maxsize: 10
